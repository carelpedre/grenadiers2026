<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <!-- Preload the homepage hero poster (the LCP element). Gated to match the
         xl breakpoint: from xl the poster is the hero's right column (~55vw);
         below xl it is a full-width banner (100vw). Each preloads its size. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      media="(min-width: 1280px)"
      imagesrcset="/images/photos/haiti-squad-hero-1280.webp 1280w, /images/photos/haiti-squad-hero-1920.webp 1920w"
      imagesizes="55vw"
    />
    <link
      rel="preload"
      as="image"
      type="image/webp"
      media="(max-width: 1279px)"
      imagesrcset="/images/photos/haiti-squad-hero-768.webp 768w, /images/photos/haiti-squad-hero-1280.webp 1280w"
      imagesizes="100vw"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
